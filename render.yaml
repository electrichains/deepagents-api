services:
  - type: web
    name: deepagent-server
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: ./langgraph-server
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: DEEPAGENTS_MODEL
        value: openai:openai/gpt-4o
      - key: LANGGRAPH_SERVER_PORT
        value: "10000"

  - type: web
    name: deepagents-ui
    runtime: node
    plan: free
    buildCommand: yarn install && yarn build
    startCommand: yarn start
    rootDir: ui
    envVars:
      - key: NODE_VERSION
        value: "20"
