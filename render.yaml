services:
  - type: web
    name: deepagents-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: DEEPAGENTS_MODEL
        value: openai:openai/gpt-4o
