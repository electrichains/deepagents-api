<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Agents Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid #2a2a2a;
    background: #1a1a1a; display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { color: #888; font-size: 13px; }
  .badge {
    background: #2d2d2d; color: #aaa; font-size: 11px; padding: 2px 8px;
    border-radius: 4px; margin-left: auto;
  }
  #chat {
    flex: 1; overflow-y: auto; padding: 24px; display: flex;
    flex-direction: column; gap: 16px;
  }
  .msg {
    max-width: 80%; padding: 12px 16px; border-radius: 12px;
    line-height: 1.5; font-size: 14px; white-space: pre-wrap;
  }
  .user { background: #2b5278; align-self: flex-end; border-bottom-right-radius: 4px; }
  .assistant { background: #1e1e1e; align-self: flex-start; border: 1px solid #2a2a2a; border-bottom-left-radius: 4px; }
  .error { background: #3d1a1a; align-self: flex-start; border: 1px solid #5a2a2a; border-bottom-left-radius: 4px; color: #ff8888; }
  .typing { align-self: flex-start; background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 12px; padding: 12px 20px; border-bottom-left-radius: 4px; }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #666; margin: 0 2px; animation: bounce 1.4s infinite both; }
  .dot:nth-child(2) { animation-delay: 0.16s; }
  .dot:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.6); } 40% { transform: scale(1); } }
  #input-bar {
    padding: 16px 24px; border-top: 1px solid #2a2a2a;
    background: #1a1a1a; display: flex; gap: 12px;
  }
  #input-bar input {
    flex: 1; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 8px;
    padding: 10px 14px; color: #e0e0e0; font-size: 14px; outline: none;
  }
  #input-bar input:focus { border-color: #4a9eff; }
  #input-bar button {
    background: #4a9eff; color: #fff; border: none; border-radius: 8px;
    padding: 10px 20px; font-size: 14px; cursor: pointer; font-weight: 500;
  }
  #input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
  #input-bar button:hover:not(:disabled) { background: #3a8eef; }
</style>
</head>
<body>
<header>
  <h1>Deep Agent</h1>
  <span>LangChain</span>
  <div class="badge">via OpenRouter</div>
</header>
<div id="chat">
  <div class="msg assistant">Hello! I'm a Deep Agent powered by LangChain. How can I help you?</div>
</div>
<div id="input-bar">
  <input id="input" type="text" placeholder="Type your message..." autofocus>
  <button id="send">Send</button>
</div>
<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const send = document.getElementById('send');

function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMsg() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg(text, 'user');
  showTyping();
  send.disabled = true;
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    removeTyping();
    if (!res.ok) {
      const err = await res.text();
      addMsg(`Error: ${res.status} ${err}`, 'error');
      return;
    }
    const data = await res.json();
    addMsg(data.response, 'assistant');
  } catch (e) {
    removeTyping();
    addMsg(`Error: ${e.message}`, 'error');
  } finally {
    send.disabled = false;
    input.focus();
  }
}

send.addEventListener('click', sendMsg);
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
